name: Generate Feeds

on:
  schedule:
    # Run daily at 7am UTC (midnight PT) — after Zara's upstream runs at 6am UTC
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Fetch extra accounts (11 accounts not in upstream)
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd scripts && node generate-feed.js --tweets-only --sources ../config/extra-sources.json --output ../feed-x-extras.json

      - name: Merge upstream + extras
        run: cd scripts && node merge-upstream.js

      - name: Commit and push feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-x-extras.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push
