name: Generate Feeds

on:
  schedule:
    # Single source of truth for evening-digest timing (feed + digest are CHAINED, see last step).
    # GitHub scheduled crons in this repo drift ~95 min late (observed: 03:10 nominal -> ~04:44 UTC
    # for weeks). Nominal 6:10 PM PT (01:10 UTC) lands the feed ~7:45 PM PT actual; the chained
    # trigger then pings the digest owner, so the digest lands ~8 PM PT. Feed is always fresh
    # before the ping because it's the same job. Do NOT add a separate clock-based digest cron.
    - cron: '10 1 * * *'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # RACE GUARD: the generator has watermark semantics — each run keeps only
      # tweets NEW since the previous run and OVERWRITES feed-x.json. Two runs
      # close together = the second clobbers a full feed with a minutes-wide
      # scrap (happened 7/5 and 7/6: manual kick vs cron, both directions).
      # If the last feed commit is younger than 15 minutes, skip this run.
      - name: Skip if a feed run landed <15 min ago
        id: guard
        run: |
          last=$(git log -1 --format=%ct -- feed-x.json || echo 0)
          now=$(date +%s)
          age=$(( now - last ))
          echo "last feed commit ${age}s ago"
          if [ "$age" -lt 900 ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping: previous feed run ${age}s ago (<900s). Watermark clobber guard."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        if: steps.guard.outputs.skip != 'true'
        run: cd scripts && npm install

      - name: Fetch all default accounts (tweets only)
        if: steps.guard.outputs.skip != 'true'
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd scripts && node generate-feed.js --tweets-only

      - name: Fetch extra accounts (tweets only)
        if: steps.guard.outputs.skip != 'true'
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
        run: |
          cd scripts && node generate-feed.js --tweets-only --sources ../config/extra-sources.json --output ../feed-x-extras.json

      - name: Merge extras into main feed + pull upstream podcasts
        if: steps.guard.outputs.skip != 'true'
        run: |
          cd scripts && node -e "
          const fs = require('fs');

          // Merge extras into main tweet feed
          const main = JSON.parse(fs.readFileSync('../feed-x.json', 'utf-8'));
          const extras = JSON.parse(fs.readFileSync('../feed-x-extras.json', 'utf-8'));
          const mainHandles = new Set(main.x.map(b => b.handle.toLowerCase()));
          const unique = extras.x.filter(b => !mainHandles.has(b.handle.toLowerCase()));
          main.x.push(...unique);
          main.stats.xBuilders = main.x.length;
          main.stats.totalTweets = main.x.reduce((s, b) => s + (b.tweets?.length || 0), 0);
          fs.writeFileSync('../feed-x.json', JSON.stringify(main, null, 2));
          console.error('Merged: ' + unique.length + ' extra builders added');

          // Pull podcasts from upstream (we don't have SUPADATA_API_KEY)
          async function fetchPodcasts() {
            const res = await fetch('https://raw.githubusercontent.com/zarazhangrui/follow-builders/main/feed-podcasts.json');
            if (res.ok) {
              const data = await res.json();
              fs.writeFileSync('../feed-podcasts.json', JSON.stringify(data, null, 2));
              console.error('Podcasts: ' + (data.podcasts?.length || 0) + ' episodes from upstream');
            } else {
              console.error('Failed to fetch upstream podcasts: ' + res.status);
            }
          }
          fetchPodcasts();
          "

      - name: Commit and push feeds
        if: steps.guard.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed-x.json feed-podcasts.json feed-x-extras.json state-feed.json
          git diff --cached --quiet || git commit -m "chore: update feeds [skip ci]"
          git push

      - name: Trigger evening digest (chained off the fresh feed)
        if: steps.guard.outputs.skip != 'true'
        if: github.event_name == 'schedule'
        env:
          DIGEST_TRIGGER_BOT_TOKEN: ${{ secrets.DIGEST_TRIGGER_BOT_TOKEN }}
        run: |
          DAILY_DIGEST_CHANNEL="1485075381613760603"
          DIGEST_OWNER_ID="1485446312798457866"  # Andrej / genius-researcher owns the digest
          curl -sf -H "Content-Type: application/json" \
            -H "Authorization: Bot ${DIGEST_TRIGGER_BOT_TOKEN}" \
            -d "{\"content\": \"<@${DIGEST_OWNER_ID}> Run the evening builder digest now. feed-x.json just regenerated (chained off generate-feed, so it is fresh). Follow the builder-digest skill.\"}" \
            "https://discord.com/api/v10/channels/${DAILY_DIGEST_CHANNEL}/messages"
