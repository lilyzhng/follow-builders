name: Sync Fork from Upstream

on:
  schedule:
    # Run daily at 6:30am UTC — 30 min before feed generation
    - cron: '30 6 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Add upstream remote
        run: git remote add upstream https://github.com/zarazhangrui/follow-builders.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Merge upstream (keep fork's changes on conflict)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Try to merge upstream. On conflict, keep our version for:
          # - config/extra-sources.json (our custom sources)
          # - feed-*.json (regenerated by our workflow anyway)
          # - state-feed.json (our state)
          # For everything else (scripts, prompts, SKILL.md), take upstream's version.
          if git merge upstream/main --no-edit; then
            echo "Merge succeeded cleanly"
          else
            echo "Merge has conflicts — resolving..."
            # For feed/config files, keep ours
            for f in config/extra-sources.json feed-x.json feed-x-extras.json feed-podcasts.json state-feed.json; do
              if git diff --name-only --diff-filter=U | grep -q "^$f$"; then
                git checkout --ours "$f"
                git add "$f"
              fi
            done
            # For everything else, take theirs (upstream improvements)
            for f in $(git diff --name-only --diff-filter=U); do
              git checkout --theirs "$f"
              git add "$f"
            done
            git commit --no-edit
          fi

      - name: Push if there are new commits
        run: |
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]; then
            git push
            echo "Synced with upstream"
          else
            echo "Already up to date"
          fi
